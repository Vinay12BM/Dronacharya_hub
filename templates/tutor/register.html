{% extends 'base.html' %}
{% block title %}Register - Dronacharya Tutor{% endblock %}
{% block content %}
<section class="min-h-[calc(100vh-68px)] flex">
  <!-- Decorative Side -->
  <div class="hidden lg:flex flex-col justify-center px-16 w-3/5 relative overflow-hidden">
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-violet/15 rounded-full blur-[100px] animate-pulse"></div>
    <div class="relative z-10">
      <h1 class="text-8xl font-black gold-text mb-6" style="font-family:'Cinzel', serif;">📜<br>Join Us</h1>
      <div class="h-1 w-24 bg-violet mb-8"></div>
      <p class="text-3xl italic text-text-secondary max-w-lg leading-relaxed font-light" style="font-family:'Space Grotesk', sans-serif;">
        "Education is the most powerful weapon which you can use to change the world."
      </p>
    </div>
  </div>

  <!-- Form Side -->
  <div class="w-full lg:w-2/5 flex items-center justify-center p-6 bg-secondary/30 backdrop-blur-3xl border-l border-white/5">
    <div class="w-full max-w-md card p-10 shadow-2xl border-gold/20 glow-pulse">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-2">Begin Journey</h2>
        <p class="text-text-secondary text-sm">Empower your mind with Dronacharya</p>
      </div>

      <form action="{{ url_for('tutor.register') }}" method="POST" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-text-secondary text-xs font-bold uppercase tracking-widest mb-1.5 pl-1">First Name</label>
            <input type="text" name="first_name" required placeholder="John">
          </div>
          <div>
            <label class="block text-text-secondary text-xs font-bold uppercase tracking-widest mb-1.5 pl-1">Last Name</label>
            <input type="text" name="last_name" required placeholder="Doe">
          </div>
        </div>
        <div>
          <label class="block text-text-secondary text-xs font-bold uppercase tracking-widest mb-1.5 pl-1">Email</label>
          <input type="email" name="email" required placeholder="scholar@example.com">
        </div>
        <div>
          <label class="block text-text-secondary text-xs font-bold uppercase tracking-widest mb-1.5 pl-1">Date of Birth</label>
          <input type="date" name="dob" required>
        </div>
        <div>
          <label class="block text-text-secondary text-xs font-bold uppercase tracking-widest mb-1.5 pl-1">Password</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="w-full btn-gold py-4 text-lg font-bold shadow-xl">
          Create Account ✨
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/5 text-center text-sm text-text-secondary">
        Already a Scholar? <a href="{{ url_for('tutor.login') }}" class="text-gold font-bold hover:underline">Log in now</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
