{% extends 'base.html' %}
{% block title %}Register - Dronacharya Tutor{% endblock %}
{% block content %}
<section class="max-w-md mx-auto py-20 px-4">
  <div class="card p-8 bg-white/80 backdrop-blur-xl border border-blue-100 shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-4">✨</div>
      <h1 style="font-family:'Cinzel',serif;" class="text-3xl font-bold text-gray-900">Create Account</h1>
      <p class="text-gray-500 text-sm">Join the legendary Dronacharya Tutor</p>
    </div>
    <form action="{{ url_for('tutor.register') }}" method="POST">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2">First Name</label>
          <input type="text" name="first_name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="John">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-2">Last Name</label>
          <input type="text" name="last_name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="Doe">
        </div>
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
        <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="email@example.com">
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Date of Birth</label>
        <input type="date" name="dob" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="Choose a secure password">
      </div>
      <button type="submit" class="w-full btn-primary btn-tutor py-4 rounded-xl font-bold text-lg shadow-lg">Register Now →</button>
    </form>
    <div class="text-center mt-6 text-sm text-gray-500">
      Already have an account? <a href="{{ url_for('tutor.login') }}" class="text-blue-600 font-bold hover:underline">Login</a>
    </div>
  </div>
</section>
{% endblock %}
