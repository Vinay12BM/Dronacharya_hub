{% extends 'base.html' %}
{% block title %}Login - Dronacharya Tutor{% endblock %}
{% block content %}
<section class="max-w-md mx-auto py-20 px-4">
  <div class="card p-8 bg-white/80 backdrop-blur-xl border border-blue-100 shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-4">🔐</div>
      <h1 style="font-family:'Cinzel',serif;" class="text-3xl font-bold text-gray-900">Login</h1>
      <p class="text-gray-500 text-sm">Welcome back to Dronacharya Hub</p>
    </div>
    <form action="{{ url_for('tutor.login') }}" method="POST">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
        <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="Enter your email">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none" placeholder="Enter your password">
      </div>
      <button type="submit" class="w-full btn-primary btn-tutor py-4 rounded-xl font-bold text-lg shadow-lg">Login →</button>
    </form>
    <div class="text-center mt-6 text-sm text-gray-500">
      Don't have an account? <a href="{{ url_for('tutor.register') }}" class="text-blue-600 font-bold hover:underline">Register now</a>
    </div>
  </div>
</section>
{% endblock %}
