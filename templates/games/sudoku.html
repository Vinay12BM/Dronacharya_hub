{% extends "base.html" %}

{% block title %}Sudoku Classic | Dronacharya Hub{% endblock %}

{% block head %}
<style>
  .sudoku-container {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sudoku-grid {
    display: grid;
    grid-template-columns: repeat(9, 45px);
    grid-template-rows: repeat(9, 45px);
    background: #070D26;
    border: 3px solid #60A5FA;
    border-radius: 10px;
    overflow: hidden;
  }
  .cell {
    width: 45px;
    height: 45px;
    border: 0.5px solid rgba(96, 165, 250, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    cursor: pointer;
    transition: background 0.2s;
  }
  .cell:hover { background: rgba(96, 165, 250, 0.1); }
  .cell[contenteditable="true"]:focus {
    background: rgba(96, 165, 250, 0.2);
    outline: none;
    background: #60A5FA;
    color: #070D26;
    font-weight: 800;
  }
  .cell:nth-child(3n) { border-right: 2px solid #60A5FA; }
  .cell:nth-child(9n) { border-right: none; }
  .row-border { border-bottom: 2px solid #60A5FA !important; }
  .fixed { background: rgba(255, 255, 255, 0.05); color: #60A5FA; font-weight: 700; cursor: default; }
  .number-pad {
    display: flex;
    gap: 8px;
    margin-top: 30px;
  }
  .num-btn {
    width: 45px;
    height: 45px;
    background: rgba(96, 165, 250, 0.2);
    border: 1px solid #60A5FA;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    cursor: pointer;
    transition: scale 0.2s;
  }
  .num-btn:active { scale: 0.9; }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#070D26] py-20 px-4">
  <div class="max-w-4xl mx-auto">
    
    <div class="text-center mb-10">
       <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent" style="font-family:'Cinzel', serif;">Sudoku Classic</h1>
       <div class="flex items-center justify-center gap-4">
          <span class="bg-blue-500 text-[#070D26] px-3 py-1 rounded-full text-xs font-bold uppercase" id="difficulty-badge">Medium</span>
          <p class="text-gray-400">Keep your mind sharp!</p>
       </div>
    </div>

    <div class="sudoku-container">
       <div id="sudoku" class="sudoku-grid"></div>
       
       <div class="number-pad">
          {% for i in range(1, 10) %}
            <button class="num-btn text-blue-400 hover:bg-blue-500 hover:text-[#070D26]" onclick="enterNum({{ i }})">{{ i }}</button>
          {% endfor %}
       </div>

       <div class="mt-8 flex gap-4 w-full justify-center">
          <button class="px-8 py-3 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-500 transition" onclick="generateNew()">New Board</button>
          <button class="px-8 py-3 bg-white/5 hover:bg-white/10 text-white rounded-2xl transition border border-white/10" onclick="checkSolution()">Verify</button>
          <button class="px-8 py-3 bg-red-600/20 text-red-500 rounded-2xl transition border border-red-500/30" onclick="clearBoard()">Clear</button>
       </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let solution = [];
  let currentSelection = null;

  function generateNew() {
     const grid = document.getElementById('sudoku');
     grid.innerHTML = '';
     
     // Simple static placeholder for now (Sudoku is complex to generate in JS from scratch instantly, using a pre-defined one)
     const board = [
        [5, 3, 0, 0, 7, 0, 0, 0, 0],
        [6, 0, 0, 1, 9, 5, 0, 0, 0],
        [0, 9, 8, 0, 0, 0, 0, 6, 0],
        [8, 0, 0, 0, 6, 0, 0, 0, 3],
        [4, 0, 0, 8, 0, 3, 0, 0, 1],
        [7, 0, 0, 0, 2, 0, 0, 0, 6],
        [0, 6, 0, 0, 0, 0, 2, 8, 0],
        [0, 0, 0, 4, 1, 9, 0, 0, 5],
        [0, 0, 0, 0, 8, 0, 0, 7, 9]
     ];
     solution = [
        [5, 3, 4, 6, 7, 8, 9, 1, 2],
        [6, 7, 2, 1, 9, 5, 3, 4, 8],
        [1, 9, 8, 3, 4, 2, 5, 6, 7],
        [8, 5, 9, 7, 6, 1, 4, 2, 3],
        [4, 2, 6, 8, 5, 3, 7, 9, 1],
        [7, 1, 3, 9, 2, 4, 8, 5, 6],
        [9, 6, 1, 5, 3, 7, 2, 8, 4],
        [2, 8, 7, 4, 1, 9, 6, 3, 5],
        [3, 4, 5, 2, 8, 6, 1, 7, 9]
     ];

     for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
           const cell = document.createElement('div');
           cell.classList.add('cell');
           if (board[r][c] !== 0) {
              cell.innerText = board[r][c];
              cell.classList.add('fixed');
           } else {
              cell.contentEditable = "true";
              cell.addEventListener('click', () => { currentSelection = cell; });
               // Limit input to 1 char and digits
               cell.addEventListener('input', () => {
                  if (!/^[1-9]$/.test(cell.innerText)) cell.innerText = '';
                  else if (cell.innerText.length > 1) cell.innerText = cell.innerText[0];
               });
           }
           if (r === 2 || r === 5) cell.classList.add('row-border');
           cell.dataset.row = r;
           cell.dataset.col = c;
           grid.appendChild(cell);
        }
     }
  }

  function enterNum(n) {
     if (currentSelection && currentSelection.contentEditable === "true") {
        currentSelection.innerText = n;
     }
  }

  function checkSolution() {
     const cells = document.querySelectorAll('.cell');
     let correct = true;
     cells.forEach(cell => {
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        const val = parseInt(cell.innerText);
        if (isNaN(val) || val !== solution[r][c]) {
           if (!cell.classList.contains('fixed')) {
              cell.style.color = '#EF4444';
              correct = false;
           }
        } else {
           cell.style.color = '#10B981';
        }
     });
     if (correct) alert("🎉 Congratulations! Board completed correctly.");
  }

  function clearBoard() {
     document.querySelectorAll('.cell').forEach(c => {
        if (c.contentEditable === "true") {
           c.innerText = '';
           c.style.color = 'white';
        }
     });
  }

  generateNew();
</script>
{% endblock %}
