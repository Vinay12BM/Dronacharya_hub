services:
  - type: web
    name: dronacharya-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dronacharya-db
          property: connectionString

databases:
  - name: dronacharya-db
    plan: free
