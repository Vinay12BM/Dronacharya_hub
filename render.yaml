services:
  - type: web
    name: dronacharya-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    releaseCommand: python -c "from app import app, db; with app.app_context(): db.create_all()"
    startCommand: gunicorn -c gunicorn.conf.py main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

